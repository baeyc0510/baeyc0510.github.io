<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Game Client Programmer · Portfolio</title>
    <meta name="description" content="Unreal / C++ 기반 게임플레이 시스템을 설계하는 클라이언트 프로그래머 포트폴리오." />
    <link rel="stylesheet" href="/src/styles/main.css" />
  </head>
  <body>
    <!-- 전역 네온 별자리 배경 (사이트 전체 뒤에 고정) -->
    <canvas id="starfield" class="starfield" aria-hidden="true"></canvas>

    <div id="nav-root"></div>

    <!-- ===== 핀 고정 2.5D 월드 (스크롤 = 가로 진행) ===== -->
    <div id="world-pin">
      <div class="world-sticky">
        <!-- 중앙 4:3 스테이지 프레임 (바깥은 여백) -->
        <div class="world-frame">
          <!-- 배경·전경·캐릭터 모두 캔버스(Three) 내부에서 렌더 -->
          <canvas id="world-canvas" aria-hidden="true"></canvas>
          <div class="world-vignette" aria-hidden="true"></div>

          <!-- HERO 오버레이 -->
          <header id="hero" class="hero-overlay">
            <div class="hero-inner">
              <p class="hero-eyebrow">GAME CLIENT PROGRAMMER</p>
              <h1 class="hero-name" data-profile="name">이름</h1>
              <p class="hero-tagline" data-profile="tagline">한 줄 소개</p>
              <div class="hero-cta" data-profile="links"></div>
            </div>
            <div class="hero-scroll">
              <span class="hero-scroll-key">SCROLL</span>
              <span class="hero-scroll-arrow">▾</span>
            </div>
          </header>

          <!-- 떠오르는 스테이지 카드 오버레이 -->
          <div id="stage-cards" class="stage-cards"></div>
        </div>
      </div>
    </div>

    <!-- 히어로 SCROLL 이 사라진 뒤 나타나는 Skip 버튼 (All Projects 로 바로 이동) -->
    <button id="skip-btn" class="skip-btn" type="button" aria-label="Skip to all projects">
      <span>SKIP</span>
      <span class="skip-arrow">▾</span>
    </button>

    <!-- ===== 이후 일반 흐름: All Projects 그리드 + Contact ===== -->
    <main id="content">
      <section id="projects" class="section section--grid">
        <div class="section-head reveal">
          <h2 class="section-title">All Projects</h2>
          <p class="section-sub">월드에서 지나친 프로젝트를 한눈에. 카드를 클릭하면 상세 페이지로 이동.</p>
        </div>
        <div id="project-grid" class="project-grid"></div>
      </section>

      <footer id="contact" class="contact">
        <div class="contact-inner reveal">
          <h2 class="section-title">Contact</h2>
          <div class="contact-links" data-profile="links"></div>
          <p class="credits">
            Character: rgsdev · Backgrounds: GameArt2D (OGA-BY 3.0, OpenGameArt)
          </p>
        </div>
      </footer>
    </main>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
